services:
  - type: web
    name: neetpg-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: CORS_ORIGINS
        sync: false  # Set to your Vercel frontend URL if different from default
      - key: PYTHON_VERSION
        value: "3.11.0"
